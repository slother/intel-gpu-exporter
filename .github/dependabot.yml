version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "09:00"
      timezone: "America/Chicago"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "09:00"
      timezone: "America/Chicago"
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "09:00"
      timezone: "America/Chicago"
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
